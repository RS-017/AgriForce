<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - AgriForce</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;600&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/index.css">
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    .auth-layout {
      display: flex;
      min-height: 100vh;
    }
    .auth-left {
      flex: 1;
      background-color: var(--color-primary);
      color: white;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: var(--space-8);
    }
    .auth-right {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: var(--space-8);
      background-color: var(--color-bg);
    }
    .auth-card {
      max-width: 400px;
      width: 100%;
      margin: 0 auto;
    }
    @media (max-width: 768px) {
      .auth-left { display: none; }
    }
  </style>
</head>
<body>

  <div class="auth-layout">
    <div class="auth-left">
      <div style="max-width: 400px; margin: 0 auto;">
        <h1 style="color: white; font-size: 3rem; margin-bottom: var(--space-4);">AgriForce</h1>
        <p style="font-size: 1.25rem; opacity: 0.9;">Predict. Connect. Harvest on Time.</p>
        <svg viewBox="0 0 420 280" xmlns="http://www.w3.org/2000/svg" class="mt-8" style="border-radius: var(--radius-md); width: 100%; max-width: 420px; opacity: 0.92;" aria-label="AgriForce farm illustration">
          <!-- Sky -->
          <rect width="420" height="280" fill="#1b4332" rx="12"/>
          <!-- Sun -->
          <circle cx="370" cy="50" r="30" fill="#f4a261" opacity="0.9"/>
          <!-- Fields -->
          <ellipse cx="210" cy="230" rx="200" ry="80" fill="#2d6a4f"/>
          <ellipse cx="210" cy="240" rx="200" ry="70" fill="#40916c"/>
          <!-- Crop rows -->
          <g stroke="#52b788" stroke-width="2" opacity="0.6">
            <line x1="60" y1="220" x2="60" y2="195"/>
            <line x1="90" y1="225" x2="90" y2="198"/>
            <line x1="120" y1="222" x2="120" y2="196"/>
            <line x1="150" y1="218" x2="150" y2="194"/>
            <line x1="180" y1="215" x2="180" y2="192"/>
            <line x1="210" y1="214" x2="210" y2="190"/>
            <line x1="240" y1="215" x2="240" y2="192"/>
            <line x1="270" y1="218" x2="270" y2="194"/>
            <line x1="300" y1="222" x2="300" y2="196"/>
            <line x1="330" y1="225" x2="330" y2="198"/>
            <line x1="360" y1="220" x2="360" y2="195"/>
          </g>
          <!-- Barn -->
          <rect x="30" y="130" width="80" height="60" fill="#d62828" rx="2"/>
          <polygon points="30,130 70,100 110,130" fill="#a4161a"/>
          <rect x="55" y="155" width="30" height="35" fill="#6b2737"/>
          <!-- Tractor -->
          <rect x="260" y="170" width="70" height="35" fill="#e9c46a" rx="4"/>
          <circle cx="280" cy="205" r="12" fill="#264653"/>
          <circle cx="315" cy="205" r="10" fill="#264653"/>
          <rect x="285" y="160" width="35" height="20" fill="#f4a261" rx="2"/>
          <!-- Worker silhouette -->
          <circle cx="195" cy="145" r="12" fill="#f4a261"/>
          <rect x="185" y="157" width="20" height="30" fill="#264653" rx="3"/>
          <line x1="185" y1="165" x2="170" y2="180" stroke="#264653" stroke-width="3" stroke-linecap="round"/>
          <line x1="205" y1="165" x2="215" y2="178" stroke="#264653" stroke-width="3" stroke-linecap="round"/>
          <!-- Label -->
          <text x="210" y="270" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="11" font-family="sans-serif">AgriForce — Connecting Farms &amp; Workers</text>
        </svg>
      </div>
    </div>
    
    <div class="auth-right">
      <div class="auth-card card">
        <h2 class="text-center mb-6">Welcome Back</h2>
        <form id="login-form" onsubmit="event.preventDefault(); validateLoginForm(new FormData(this));">
          <div class="form-group">
            <label class="form-label" for="phone">Phone Number or Email</label>
            <input type="text" id="phone" name="phone" class="form-control" required placeholder="Enter phone or email">
          </div>
          
          <div class="form-group">
            <label class="form-label" for="password">Password</label>
            <input type="password" id="password" name="password" class="form-control" required placeholder="Enter password">
          </div>
          
          <div class="flex justify-between items-center mb-4 text-sm">
            <label class="flex items-center gap-2">
              <input type="checkbox"> Remember me
            </label>
            <a href="#" class="text-primary font-medium">Forgot Password?</a>
          </div>
          
          <button type="submit" id="login-submit-btn" class="btn btn-primary w-100 mb-4">Login</button>
          
          <p class="text-center text-muted">
            Don't have an account? <a href="register.html" class="font-bold">Register</a>
          </p>
        </form>
      </div>
    </div>
  </div>

  <script src="assets/js/config.js"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
